  - id: elysium
    title: "ELYSIUM — Sovereign Cognitive Architecture"
    type: personal
    date: "2024 — présent"
    featured: true
    tags: [architecture, ai-ml, kubernetes, knowledge-graph, devops, python]
    summary: >
      Plateforme cognitive auto-souveraine (700+ sous-projets « SIGILs ») pensée comme
      cerveau structuré d'une future IA autonome : Knowledge Graph KuzuDB de 13K+ nœuds
      indexant l'AST de 22 langages, GNN custom en NumPy pur, cluster K3s GPU 4 nœuds,
      chaîne d'audit git souveraine. ~30 mois en solo.
    links:
      github: "https://github.com/RoJLD/ELYSIUM"
    snippet:
      lang: python
      label: "GraphSAGE-lite (NumPy pur, zéro dépendance deep-learning)"
      note: "Une couche d'agrégation moyenne des voisins, combinée à l'état du nœud — le cœur du routage d'intentions sémantiques sur le graphe."
      code: |
        import numpy as np

        def sage_layer(H, A, W_self, W_neigh):
            """Une couche GraphSAGE-mean : agrège les voisins puis combine au self."""
            deg = A.sum(axis=1, keepdims=True)
            neigh = (A @ H) / np.clip(deg, 1, None)   # moyenne des voisins
            out = H @ W_self + neigh @ W_neigh         # self + voisinage
            return np.maximum(out, 0.0)                # ReLU

