  - id: derivatives-pricer
    title: "Pricer d'options européennes (Black-Scholes)"
    type: academic
    date: "ECE Paris"
    tags: [quant, finance, derivatives, python]
    summary: >
      Pricing d'options européennes en temps réel (call/put + delta) — la démo interactive
      de la page d'accueil. Formule fermée de Black-Scholes.
    links:
      demo: "index.html#demos"
    snippet:
      lang: python
      label: "Black-Scholes — prix call/put + delta"
      code: |
        from math import log, sqrt, exp, erf

        def norm_cdf(x):
            return 0.5 * (1.0 + erf(x / sqrt(2.0)))

        def black_scholes(S, K, T, r, sigma):
            d1 = (log(S / K) + (r + 0.5 * sigma ** 2) * T) / (sigma * sqrt(T))
            d2 = d1 - sigma * sqrt(T)
            call = S * norm_cdf(d1) - K * exp(-r * T) * norm_cdf(d2)
            put = K * exp(-r * T) * norm_cdf(-d2) - S * norm_cdf(-d1)
            return {"call": call, "put": put, "delta": norm_cdf(d1)}

  - id: monte-carlo-gbm
    title: "Simulation Monte-Carlo — Mouvement Brownien Géométrique"
    type: academic
    date: "ECE Paris"
    tags: [quant, finance, python, simulation]
    summary: >
      Génération de trajectoires GBM pour le pricing d'options par simulation — la 2ᵉ démo
      interactive de la page d'accueil.
    links:
      demo: "index.html#demos"
    snippet:
      lang: python
      label: "Trajectoires GBM vectorisées (NumPy)"
      code: |
        import numpy as np

        def gbm_paths(S0, mu, sigma, T, steps, n):
            dt = T / steps
            Z = np.random.standard_normal((n, steps))
            incr = (mu - 0.5 * sigma ** 2) * dt + sigma * np.sqrt(dt) * Z
            return S0 * np.exp(np.cumsum(incr, axis=1))

